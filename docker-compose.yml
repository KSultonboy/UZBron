services:
  postgres:
    image: postgres:16-alpine
    container_name: uzbooking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uzbooking
      POSTGRES_PASSWORD: uzbooking
      POSTGRES_DB: uzbooking
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uzbooking"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uzbooking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data

  minio:
    image: minio/minio:latest
    container_name: uzbooking-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: uzbooking
      MINIO_ROOT_PASSWORD: uzbooking123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - ./docker-data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
