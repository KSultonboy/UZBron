<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",system-ui,sans-serif}
html,body{width:1080px;height:1920px;overflow:hidden}
.f{width:1080px;height:1920px;background:#F5F7FB;display:flex;flex-direction:column}
.cap{background:linear-gradient(135deg,#20428f,#16306f);padding:90px 80px 70px;color:#fff;border-bottom-left-radius:48px;border-bottom-right-radius:48px}
.cap .k{color:#eab308;font-weight:700;font-size:34px;letter-spacing:1px;margin-bottom:18px}
.cap h1{font-size:66px;font-weight:800;line-height:1.12}
.scr{flex:1;padding:54px 70px;display:grid;grid-template-columns:1fr 1fr;gap:34px;align-content:start}
.card{background:#fff;border:1px solid #E7ECF3;border-radius:30px;overflow:hidden;box-shadow:0 14px 40px rgba(11,26,61,.09)}
.ph{height:300px;background-size:cover;background-position:center;position:relative}
.badge{position:absolute;top:22px;left:22px;background:#fff;color:#CA8A04;font-weight:800;font-size:22px;padding:10px 20px;border-radius:14px}
.cb{padding:26px 28px}
.stars{color:#F59E0B;font-size:24px;letter-spacing:3px}
.cb h3{font-size:34px;font-weight:800;color:#0F172A;margin:12px 0 8px}
.loc{color:#64748B;font-size:25px}
.pr{display:flex;align-items:flex-end;justify-content:space-between;border-top:1px solid #E7ECF3;margin-top:22px;padding-top:22px}
.p{font-size:33px;font-weight:800;color:#0F172A}
.rt{display:flex;align-items:center;gap:8px;font-size:28px;font-weight:800;color:#0F172A}
.rt svg{width:28px;height:28px;fill:#F59E0B;stroke:#F59E0B}
