<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",system-ui,sans-serif}
html,body{width:1080px;height:1920px;overflow:hidden}
.f{width:1080px;height:1920px;background:#F5F7FB;display:flex;flex-direction:column;position:relative}
.cap{background:linear-gradient(135deg,#20428f,#16306f);padding:80px 80px 60px;color:#fff}
.cap .k{color:#eab308;font-weight:700;font-size:34px;letter-spacing:1px;margin-bottom:16px}
.cap h1{font-size:62px;font-weight:800;line-height:1.12}
.hero{height:560px;background-size:cover;background-position:center}
.body{flex:1;background:#fff;margin-top:-44px;border-top-left-radius:48px;border-top-right-radius:48px;padding:54px 70px;position:relative}
.stars{color:#F59E0B;font-size:32px;letter-spacing:5px}
.body h2{font-size:56px;font-weight:800;color:#0F172A;margin:16px 0 14px}
.loc{color:#64748B;font-size:32px;display:flex;align-items:center;gap:12px;margin-bottom:40px}
.loc svg{width:32px;height:32px;stroke:#64748B}
.am{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:46px}
.chip{background:#EEF3FC;color:#1E3A8A;font-size:28px;font-weight:700;padding:18px 30px;border-radius:18px}
.desc{color:#64748B;font-size:31px;line-height:1.55;margin-bottom:40px}
.bar{position:absolute;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #E7ECF3;padding:40px 70px;display:flex;align-items:center;justify-content:space-between}
.p{font-size:50px;font-weight:800;color:#0F172A}.p small{font-size:28px;font-weight:500;color:#64748B}
.btn{background:linear-gradient(135deg,#20428f,#16306f);color:#fff;font-size:36px;font-weight:800;padding:34px 64px;border-radius:24px;display:flex;align-items:center;gap:18px}
.btn svg{width:36px;height:36px;stroke:#fff}
</style></head><body>
<div class="f">
  <div class="cap"><div class="k">UZBRON</div><h1>Bir necha bosqichda<br>bron qiling</h1></div>
  <div class="hero" style="background-image:url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1100&q=85')"></div>
  <div class="body">
    <div class="stars">★★★★★</div>
    <h2>Hilton Tashkent City</h2>
    <div class="loc"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>Toshkent, Shayxontohur tumani</div>
    <div class="am"><div class="chip">Bepul Wi-Fi</div><div class="chip">Basseyn</div><div class="chip">Nonushta</div><div class="chip">Avtoturargoh</div></div>
    <div class="desc">Toshkent markazidagi zamonaviy mehmonxona. Qulay xonalar, sifatli xizmat va shahar markaziga yaqin joylashuv.</div>
    <div class="bar"><div><div class="p">850 000 <small>so'm</small></div></div><div class="btn"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Bron qilish</div></div>
  </div>
</div></body></html>
