<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",system-ui,sans-serif}
html,body{width:1080px;height:1920px;overflow:hidden}
.f{width:1080px;height:1920px;background:#F5F7FB;display:flex;flex-direction:column}
.cap{background:linear-gradient(135deg,#20428f,#16306f);padding:90px 80px 70px;color:#fff;border-bottom-left-radius:48px;border-bottom-right-radius:48px}
.cap .k{color:#eab308;font-weight:700;font-size:34px;letter-spacing:1px;margin-bottom:18px}
.cap h1{font-size:66px;font-weight:800;line-height:1.12}
.scr{flex:1;padding:60px 80px;display:flex;flex-direction:column;gap:34px}
.search{background:#fff;border:1px solid #E7ECF3;border-radius:28px;padding:34px 40px;display:flex;align-items:center;gap:24px;box-shadow:0 12px 40px rgba(11,26,61,.08)}
.search .ic{width:52px;height:52px;border-radius:14px;background:#EEF3FC;display:flex;align-items:center;justify-content:center}
.search .ic svg{width:30px;height:30px;stroke:#1E3A8A}
.search .t{color:#94A3B8;font-size:34px;font-weight:600}
.cats{display:flex;gap:22px}
.cat{flex:1;background:#fff;border:1px solid #E7ECF3;border-radius:24px;padding:30px 0;text-align:center}
.cat.on{background:#EEF3FC;border-color:#1E3A8A}
.cat svg{width:42px;height:42px;stroke:#1E3A8A;margin-bottom:14px}
.cat.off svg{stroke:#94A3B8}.cat .l{font-size:26px;font-weight:700;color:#0F172A}.cat.off .l{color:#94A3B8}
.row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:8px}
.row .gold{color:#CA8A04;font-weight:700;font-size:30px}.row h2{font-size:48px;font-weight:800;color:#0F172A;margin-top:6px}
.card{background:#fff;border:1px solid #E7ECF3;border-radius:32px;overflow:hidden;box-shadow:0 16px 44px rgba(11,26,61,.09)}
.card .ph{height:430px;background-size:cover;background-position:center;position:relative}
.badge{position:absolute;top:28px;left:28px;background:#fff;color:#CA8A04;font-weight:800;font-size:26px;padding:14px 26px;border-radius:16px}
.heart{position:absolute;top:28px;right:28px;width:64px;height:64px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center}
.heart svg{width:34px;height:34px;stroke:#0F172A;fill:none}
.cbody{padding:34px 40px}
.stars{color:#F59E0B;font-size:30px;letter-spacing:4px}
.cbody h3{font-size:42px;font-weight:800;color:#0F172A;margin:14px 0 10px}
.loc{color:#64748B;font-size:30px;display:flex;align-items:center;gap:12px}
.loc svg{width:30px;height:30px;stroke:#64748B}
.pr{display:flex;align-items:flex-end;justify-content:space-between;border-top:1px solid #E7ECF3;margin-top:30px;padding-top:30px}
.pr .p{font-size:44px;font-weight:800;color:#0F172A}.pr .p small{font-size:26px;font-weight:500;color:#64748B}
.pr .u{font-size:24px;color:#64748B}
.rt{display:flex;align-items:center;gap:10px;font-size:34px;font-weight:800;color:#0F172A}
.rt svg{width:34px;height:34px;fill:#F59E0B;stroke:#F59E0B}
</style></head><body>
<div class="f">
  <div class="cap"><div class="k">UZBRON</div><h1>Mehmonxonalarni<br>bir joyda toping</h1></div>
  <div class="scr">
    <div class="search"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div><div class="t">Shahar yoki mehmonxona</div></div>
    <div class="cats">
      <div class="cat on"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg><div class="l">Mehmonxona</div></div>
      <div class="cat off"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><div class="l">Dacha</div></div>
      <div class="cat off"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 11h18"/><path d="M12 2a7 7 0 0 1 7 7v2H5V9a7 7 0 0 1 7-7z"/></svg><div class="l">Restoran</div></div>
    </div>
    <div class="row"><div><div class="gold">Eng yaxshi tanlovlar</div><h2>Tavsiya etilgan</h2></div></div>
    <div class="card">
      <div class="ph" style="background-image:url('https://images.unsplash.com/photo-1564501049412-61c2a3083791?auto=format&fit=crop&w=1100&q=85')">
        <div class="badge">Mashhur</div>
        <div class="heart"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></div>
      </div>
      <div class="cbody">
        <div class="stars">★★★★★</div>
        <h3>Hilton Tashkent City</h3>
        <div class="loc"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>Toshkent · Shayxontohur</div>
        <div class="pr"><div><div class="p">850 000 <small>so'm</small></div><div class="u">1 kecha uchun</div></div><div class="rt"><svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9 16 14 18 21 12 17 6 21 8 14 2 9 9 9"/></svg>4.9</div></div>
      </div>
    </div>
  </div>
</div></body></html>
