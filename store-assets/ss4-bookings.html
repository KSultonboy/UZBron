<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",system-ui,sans-serif}
html,body{width:1080px;height:1920px;overflow:hidden}
.f{width:1080px;height:1920px;background:#F5F7FB;display:flex;flex-direction:column}
.cap{background:linear-gradient(135deg,#20428f,#16306f);padding:90px 80px 70px;color:#fff;border-bottom-left-radius:48px;border-bottom-right-radius:48px}
.cap .k{color:#eab308;font-weight:700;font-size:34px;letter-spacing:1px;margin-bottom:18px}
.cap h1{font-size:66px;font-weight:800;line-height:1.12}
.scr{flex:1;padding:54px 70px;display:flex;flex-direction:column;gap:32px}
.bk{background:#fff;border:1px solid #E7ECF3;border-radius:30px;padding:30px;display:flex;gap:30px;box-shadow:0 14px 40px rgba(11,26,61,.08)}
.bk .ph{width:230px;height:200px;border-radius:22px;background-size:cover;background-position:center;flex-shrink:0}
.bk .in{flex:1;display:flex;flex-direction:column}
.bk h3{font-size:38px;font-weight:800;color:#0F172A;margin-bottom:10px}
.bk .d{color:#64748B;font-size:28px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.bk .d svg{width:28px;height:28px;stroke:#64748B}
.st{align-self:flex-start;margin-top:auto;font-size:26px;font-weight:800;padding:12px 26px;border-radius:14px;display:flex;align-items:center;gap:10px}
.st.ok{background:#effaf6;color:#0E9F6E}.st.wait{background:#FEF6E0;color:#CA8A04}
.st svg{width:26px;height:26px;stroke:currentColor;fill:none}
.pp{margin-top:14px;font-size:38px;font-weight:800;color:#0F172A;text-align:right}
</style></head><body>

    </div>

      <div class="in"><h3>Silk Road Samarqand</h3><div class="d"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>20–22 iyul · 2 mehmon</div><div class="st wait"><svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Kutilmoqda</div><div class="pp">1 440 000 so'm</div></div>

    </div>
